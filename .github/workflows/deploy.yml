name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # Outputs built assets to static/dist/ (configured in vite.config.js)

      - name: Prepare GitHub Pages root
        run: |
          mkdir -p _site
          # Copy the main dashboard HTML to the root index
          cp templates/dashboard.html _site/index.html
          # Rewrite absolute /static/ paths to be relative for GitHub Pages
          sed -i \
            -e 's|href="/static/|href="static/|g' \
            -e 's|src="/static/|src="static/|g' \
            -e 's|url("/static/|url("static/|g' \
            _site/index.html
          # Copy all static assets (CSS, JS, GLSL, built React bundle)
          cp -r static _site/static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
